<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stllr Network — Leave Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--card:#111111;--card2:#181818;
  --border:#222222;--border2:#333333;
  --text:#f5f5f5;--muted:#888888;--muted2:#555555;--white:#ffffff;
  --accent-dim:rgba(255,255,255,.07);
}
html{font-family:'DM Sans',sans-serif;font-size:15px;background:var(--bg);color:var(--text);min-height:100vh}
body{min-height:100vh;overflow-x:hidden;position:relative}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:var(--min-o,.04);transform:scale(1)}50%{opacity:var(--max-o,.45);transform:scale(1.4)}}
#app{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 1.25rem 3rem}
header{display:flex;align-items:center;justify-content:space-between;padding:1.5rem 0 2rem;flex-wrap:wrap;gap:1rem}
.logo{display:flex;align-items:center;gap:.75rem}
.logo-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#2a2a2a,#141414);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.logo-text{font-weight:700;font-size:1.3rem;letter-spacing:-.02em;color:var(--white)}
.logo-text span{color:var(--muted)}
.header-meta{font-size:.8rem;color:var(--muted);text-align:right}
.header-meta strong{color:var(--text);display:block;font-size:.85rem;font-weight:600}
.quick-add{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem;align-items:center}
.quick-add-label{font-size:.72rem;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.09em;margin-right:.25rem;white-space:nowrap}
.qa-btn{font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;padding:.5rem 1rem;border-radius:9px;border:1px solid var(--border2);cursor:pointer;background:var(--card2);color:var(--muted);transition:all .16s;display:inline-flex;align-items:center;gap:.4rem;white-space:nowrap}
.qa-btn:hover{color:var(--white);border-color:#555}
.qa-btn.qa-vac{border-color:rgba(255,255,255,.2);color:var(--text)}
.qa-btn.qa-vac:hover{background:var(--white);color:#080808;border-color:var(--white)}
nav{display:flex;gap:.35rem;margin-bottom:2rem;flex-wrap:wrap;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.35rem}
.nav-btn{font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;padding:.5rem .95rem;border-radius:8px;border:none;cursor:pointer;background:transparent;color:var(--muted);transition:all .16s;white-space:nowrap}
.nav-btn:hover{color:var(--text);background:var(--border)}
.nav-btn.active{background:var(--white);color:#080808;font-weight:700}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.25rem}
.section-title{font-weight:700;font-size:1.3rem;margin-bottom:1.25rem;letter-spacing:-.02em;color:var(--white)}
.section-sub{font-size:.82rem;color:var(--muted);margin-top:.2rem;font-weight:400}
.grid-2{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.emp-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.25rem;transition:border-color .16s}
.emp-card:hover{border-color:var(--border2)}
.emp-header{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem}
.emp-avatar{width:40px;height:40px;border-radius:50%;background:var(--card2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.emp-name{font-weight:700;font-size:.95rem;color:var(--white)}
.leave-row{margin-bottom:.7rem}
.leave-row-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem;font-size:.78rem}
.leave-label{color:var(--muted)}
.leave-count{font-weight:600;font-size:.8rem;color:var(--text)}
.progress-track{height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.prog-vac{background:#e5e5e5}.prog-sick{background:#888}.prog-warn{background:#aaa}.prog-danger{background:#666}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}
.form-group{display:flex;flex-direction:column;gap:.4rem}
.form-label{font-size:.74rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.form-input,.form-select,.form-textarea{background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:.65rem .85rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .16s,box-shadow .16s;width:100%}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--white);box-shadow:0 0 0 3px rgba(255,255,255,.07)}
.form-select option{background:#181818}
.form-textarea{resize:vertical;min-height:80px}
.toggle-row{display:flex;align-items:center;gap:.75rem;margin:.25rem 0}
.toggle-label{font-size:.88rem;color:var(--muted)}
.toggle{position:relative;width:42px;height:24px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--border2);border-radius:12px;transition:.2s}
.toggle-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:var(--muted);border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-slider{background:var(--white)}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px);background:#080808}
.checkbox-row{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;background:var(--accent-dim);border:1px solid var(--border2);border-radius:10px;cursor:pointer}
.checkbox-row input[type=checkbox]{accent-color:var(--white);width:16px;height:16px;cursor:pointer}
.checkbox-label{font-size:.88rem;color:var(--text)}
.btn{font-family:'DM Sans',sans-serif;font-weight:700;font-size:.88rem;padding:.7rem 1.5rem;border-radius:10px;border:none;cursor:pointer;transition:all .16s;display:inline-flex;align-items:center;gap:.5rem}
.btn-primary{background:var(--white);color:#080808}
.btn-primary:hover{background:#ddd;transform:translateY(-1px)}
.balance-row{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1.25rem}
.balance-pill{flex:1;min-width:120px;background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:.65rem .9rem}
.balance-pill-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.2rem;font-weight:700}
.balance-pill-val{font-weight:700;font-size:1.2rem;color:var(--white)}
.holiday-warn{display:none;align-items:center;gap:.6rem;padding:.6rem .9rem;background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:8px;font-size:.82rem;color:var(--text);margin-top:.5rem}
.holiday-warn.show{display:flex}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:.75rem}
.cal-nav{display:flex;align-items:center;gap:.75rem}
.cal-month{font-weight:700;font-size:1.1rem;color:var(--white)}
.cal-btn{background:var(--card2);border:1px solid var(--border2);border-radius:8px;color:var(--muted);width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.16s;font-size:1rem}
.cal-btn:hover{color:var(--white);border-color:#555}
.cal-filter{background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:.4rem .7rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.82rem;outline:none}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{text-align:center;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted2);padding:.4rem 0}
.cal-day{min-height:80px;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:.35rem .4rem;overflow:hidden}
.cal-day.today{border-color:var(--white);box-shadow:0 0 0 1px var(--white)}
.cal-day.today .cal-day-num{color:var(--white);font-weight:700}
.cal-day.other-month{opacity:.22}
.cal-day.weekend{background:rgba(255,255,255,.02)}
.cal-day.weekend .cal-day-num{color:var(--muted2)}
.cal-day.has-content{cursor:pointer}
.cal-day.has-content:hover{border-color:var(--border2);background:rgba(255,255,255,.04)}
.cal-day-num{font-size:.78rem;font-weight:500;margin-bottom:.2rem;color:var(--muted)}
.cal-day-flags{display:flex;gap:2px;flex-wrap:wrap;margin-bottom:2px}
.cal-flag{font-size:.75rem;line-height:1}
.cal-event{font-size:.67rem;padding:.1rem .3rem;border-radius:4px;margin-bottom:2px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.ev-vac{background:rgba(255,255,255,.11);color:#e0e0e0}
.ev-sick{background:rgba(255,255,255,.05);color:#aaa}
.ev-half{background:rgba(255,255,255,.08);color:#ccc}
.ev-hol-ksa{background:rgba(255,255,255,.13);color:#ddd;border-left:2px solid rgba(255,255,255,.35)}
.ev-hol-eg{background:rgba(255,255,255,.09);color:#ccc;border-left:2px solid rgba(255,255,255,.25)}
.ev-hol-uae{background:rgba(255,255,255,.07);color:#bbb;border-left:2px solid rgba(255,255,255,.18)}
.ev-hol-pk{background:rgba(255,255,255,.05);color:#aaa;border-left:2px solid rgba(255,255,255,.13)}
.ev-hol-de{background:rgba(255,255,255,.04);color:#999;border-left:2px solid rgba(255,255,255,.1)}
.cal-legend{display:flex;gap:1rem;flex-wrap:wrap;margin-top:1rem}
.leg-item{display:flex;align-items:center;gap:.4rem;font-size:.75rem;color:var(--muted)}
.leg-dot{width:10px;height:10px;border-radius:3px}
.board-filters{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center}
.filter-select{background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:.4rem .7rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.82rem;outline:none}
.req-list{display:flex;flex-direction:column;gap:.55rem}
.req-card{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:.9rem 1rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;transition:border-color .16s}
.req-card:hover{border-color:var(--border2)}
.req-type-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.req-info{flex:1;min-width:180px}
.req-name{font-weight:600;font-size:.88rem;margin-bottom:.15rem;color:var(--white)}
.req-dates{font-size:.78rem;color:var(--muted)}
.req-note{font-size:.75rem;color:var(--muted2);font-style:italic;margin-top:.2rem}
.req-badges{display:flex;gap:.4rem;align-items:center;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:.25rem;padding:.18rem .55rem;border-radius:5px;font-size:.71rem;font-weight:600;border:1px solid var(--border2);color:var(--muted);background:var(--card)}
.badge-vac{color:var(--text);border-color:rgba(255,255,255,.15)}
.badge-sick{color:var(--muted)}
.badge-approved{color:var(--text);border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.06)}
.badge-pending{color:var(--muted2)}
.req-actions{display:flex;gap:.4rem;align-items:center}
.action-btn{background:transparent;border:1px solid var(--border2);border-radius:7px;padding:.3rem .6rem;font-size:.75rem;cursor:pointer;color:var(--muted);transition:.16s;font-family:'DM Sans',sans-serif;font-weight:500}
.action-btn:hover{color:var(--text);border-color:#555}
.action-btn.approve:hover{background:rgba(255,255,255,.07)}
.action-btn.del:hover{background:rgba(255,255,255,.04)}
#toast-container{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;display:flex;flex-direction:column;gap:.5rem;pointer-events:none}
.toast{background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:.7rem 1rem;font-size:.83rem;min-width:220px;max-width:320px;display:flex;align-items:center;gap:.6rem;pointer-events:auto;animation:slideIn .25s ease;box-shadow:0 4px 28px rgba(0,0,0,.7)}
.toast.success{border-left:3px solid #ccc}
.toast.error{border-left:3px solid #666}
.toast.info{border-left:3px solid #444}
@keyframes slideIn{from{transform:translateX(60px);opacity:0}to{transform:translateX(0);opacity:1}}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:.88rem}
.empty-icon{font-size:2.5rem;display:block;margin-bottom:.75rem;opacity:.3}
.recent-reqs{margin-top:.85rem;padding-top:.75rem;border-top:1px solid var(--border)}
.recent-req-item{display:flex;justify-content:space-between;align-items:center;padding:.25rem 0;font-size:.75rem;color:var(--muted);border-bottom:1px solid rgba(255,255,255,.03)}
.recent-req-item:last-child{border-bottom:none}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:18px;padding:1.5rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.modal-title{font-weight:700;font-size:1.05rem;color:var(--white)}
.modal-close{background:var(--card2);border:1px solid var(--border2);border-radius:8px;color:var(--muted);width:30px;height:30px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:.16s}
.modal-close:hover{color:var(--white)}
.type-pills{display:flex;gap:.45rem;margin-bottom:1.25rem}
.type-pill{flex:1;padding:.5rem .4rem;border-radius:8px;border:1px solid var(--border2);background:var(--card2);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;text-align:center;transition:.16s}
.type-pill:hover{border-color:#555;color:var(--text)}
.type-pill.active{background:var(--white);color:#080808;border-color:var(--white)}
.day-drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1500;align-items:flex-end;justify-content:center}
.day-drawer-overlay.open{display:flex}
.day-drawer{background:var(--card);border:1px solid var(--border2);border-radius:18px 18px 0 0;width:100%;max-width:540px;max-height:75vh;overflow-y:auto;padding:1.25rem 1.25rem 2rem;animation:drawerUp .2s ease}
@keyframes drawerUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.day-drawer-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto .9rem}
.day-drawer-date{font-weight:700;font-size:1rem;color:var(--white);margin-bottom:1rem}
.day-drawer-section{margin-bottom:1rem}
.day-drawer-section-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted2);margin-bottom:.45rem}
.day-drawer-row{display:flex;align-items:center;gap:.65rem;padding:.55rem .7rem;background:var(--card2);border:1px solid var(--border);border-radius:9px;margin-bottom:.35rem;font-size:.84rem}
.day-drawer-row-icon{font-size:1rem;flex-shrink:0}
.day-drawer-row-main{flex:1}
.day-drawer-row-name{font-weight:600;color:var(--white)}
.day-drawer-row-sub{font-size:.75rem;color:var(--muted);margin-top:.1rem}
.day-drawer-hol-type{font-size:.68rem;font-weight:700;padding:.12rem .45rem;border-radius:4px;border:1px solid var(--border2);color:var(--muted2)}
.hol-country-block{margin-bottom:2rem}
.hol-country-header{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.hol-country-name{font-weight:700;font-size:1.05rem;color:var(--white);letter-spacing:-.01em}
.hol-table{width:100%;border-collapse:collapse}
.hol-table tr{border-bottom:1px solid rgba(255,255,255,.04)}
.hol-table tr:last-child{border-bottom:none}
.hol-table td{padding:.6rem .5rem;font-size:.85rem;vertical-align:middle}
.hol-date{color:var(--muted);font-variant-numeric:tabular-nums;width:110px;font-weight:500;white-space:nowrap}
.hol-name{color:var(--text);font-weight:500}
.hol-type{text-align:right;width:110px}
.hol-badge{display:inline-block;padding:.15rem .55rem;border-radius:5px;font-size:.7rem;font-weight:700;border:1px solid var(--border2);color:var(--muted2);background:var(--card2);text-transform:uppercase;letter-spacing:.04em}
.hol-badge-pub{border-color:rgba(255,255,255,.15);color:var(--muted)}
.hol-badge-obs{border-color:rgba(255,255,255,.08);color:var(--muted2)}
.hol-filter-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem;align-items:center}
.hol-filter-btn{font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;padding:.4rem .85rem;border-radius:8px;border:1px solid var(--border2);background:var(--card2);color:var(--muted);cursor:pointer;transition:.16s}
.hol-filter-btn:hover{color:var(--text);border-color:#555}
.hol-filter-btn.active{background:var(--white);color:#080808;border-color:var(--white)}
/* ── RESPONSIVE ──────────────────────────────────────────────────────────── */
@media(max-width:768px){
  html{font-size:14px}
  #app{padding:0 1rem 4rem}
  header{padding:1rem 0 1.5rem;gap:.75rem}
  .logo-text{font-size:1.15rem}
  .header-meta{font-size:.75rem}
  nav{gap:.25rem;padding:.3rem}
  .nav-btn{font-size:.78rem;padding:.4rem .7rem}
  .quick-add{gap:.4rem}
  .qa-btn{font-size:.78rem;padding:.45rem .8rem}
  .grid-2{grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
  .req-card{flex-wrap:wrap;gap:.75rem}
  .req-info{min-width:0;width:100%}
  .req-badges{width:100%}
  .req-actions{width:100%;justify-content:flex-end}
  .doc-hero-title{font-size:1.3rem}
  .doc-grid{grid-template-columns:1fr 1fr}
  .doc-compare{grid-template-columns:1fr}
  .cal-day{min-height:68px}
  .hol-table td{padding:.45rem .35rem}
  .log-details{font-size:.78rem}
}
@media(max-width:480px){
  html{font-size:13px}
  #app{padding:0 .75rem 4rem}
  header{padding:.85rem 0 1.25rem}
  .logo-icon{width:34px;height:34px;font-size:17px}
  .logo-text{font-size:1.05rem}
  nav{padding:.25rem;gap:.2rem}
  .nav-btn{font-size:.72rem;padding:.35rem .55rem;border-radius:6px}
  .quick-add-label{display:none}
  .qa-btn{font-size:.75rem;padding:.4rem .7rem}
  .section-title{font-size:1.1rem}
  .grid-2{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .balance-row{flex-direction:column;gap:.5rem}
  .balance-pill{min-width:0}
  .req-card{padding:.75rem}
  .req-name{font-size:.83rem}
  .req-dates{font-size:.74rem}
  .action-btn{padding:.3rem .5rem;font-size:.72rem}
  .cal-grid{gap:2px}
  .cal-day{min-height:52px}
  .cal-event{display:none}
  .cal-day-flags{display:none}
  .hol-date{width:80px;font-size:.76rem}
  .hol-name{font-size:.78rem}
  .hol-type{display:none}
  .doc-hero{padding:1.25rem}
  .doc-hero-title{font-size:1.15rem}
  .doc-grid{grid-template-columns:1fr}
  .doc-stat{padding:.85rem 1rem}
  .doc-compare{grid-template-columns:1fr}
  .log-toolbar{gap:.4rem}
  .log-filter-btn{font-size:.72rem;padding:.28rem .6rem}
  .log-clear{font-size:.72rem;padding:.28rem .6rem}
  .log-stats{gap:.5rem}
  .log-stat-pill{min-width:80px;padding:.5rem .65rem}
  .type-pills{gap:.3rem}
  .type-pill{font-size:.74rem;padding:.4rem .25rem}
  .modal{padding:1.1rem}
  .day-drawer{padding:1rem 1rem 1.75rem}
}
@media(max-width:360px){
  .nav-btn{font-size:.68rem;padding:.3rem .45rem}
  .qa-btn{font-size:.72rem;padding:.35rem .6rem}
  .action-btn{font-size:.68rem}
}
/* ── CENTERED CONFIRM DIALOG ─────────────────────────────────────────────── */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:3000;display:flex;align-items:center;justify-content:center;padding:1.25rem;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.confirm-icon{font-size:2rem;text-align:center;margin-bottom:.75rem;line-height:1}

.confirm-btn{flex:1;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.85rem;padding:.7rem .5rem;border-radius:10px;border:none;cursor:pointer;transition:all .16s}
.confirm-btn-primary{background:var(--white);color:#080808}
.confirm-btn-primary:hover{background:#ddd}
.confirm-btn-secondary{background:transparent;border:1px solid var(--border2);color:var(--muted)}
.confirm-btn-secondary:hover{color:var(--text);border-color:#555}
.confirm-warn{background:rgba(255,200,0,.06);border:1px solid rgba(255,200,0,.15);border-radius:8px;padding:.6rem .85rem;font-size:.78rem;color:#cc9;text-align:center;margin-bottom:1rem;line-height:1.5}

// ─── PERSISTENCE — Google Sheets (one row per request) ───────────────────────
// Sheet: "Requests" tab — columns: id,empId,type,startDate,endDate,isHalf,days,note,approved,overflow,createdAt
// Sheet: "Log" tab      — columns: ts,action,details
// Falls back to localStorage if GAS_URL is not configured.

const _useGAS = GAS_URL.trim().length > 0;

async function gasRequest(action, payload={}){
  const res = await fetch(GAS_URL, {
    method:'POST',
    body:JSON.stringify({action,...payload}),
  });
  if(!res.ok) throw new Error('GAS HTTP '+res.status);
  return res.json();
}

// ── Requests ────────────────────────────────────────────────────────────────

async function save(){
  // No-op: writes are now granular (addRequest / updateRequest / deleteRequest)
  // localStorage fallback still writes the full array for offline mode
  if(!_useGAS){
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify(requests))}catch(_){}
  }
}

async function load(){
  if(!_useGAS){
    try{const d=localStorage.getItem(STORAGE_KEY);if(d)requests=JSON.parse(d);}catch(_){}
    return;
  }
  try{
    const r=await gasRequest('getRequests');
    requests=(r?.rows||[]).map(row=>({
      id:row[0], empId:row[1], type:row[2],
      startDate:row[3], endDate:row[4],
      isHalf:row[5]==='true'||row[5]===true,
      days:parseFloat(row[6])||0,
      note:row[7]||'',
      approved:row[8]==='true'||row[8]===true,
      overflow:row[9]==='true'||row[9]===true,
      createdAt:row[10]||'',
    }));
  }catch(e){requests=[];console.warn('load:',e);}
}

async function addRequest(req){
  if(!_useGAS){
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify(requests))}catch(_){}
    return;
  }
  try{
    await gasRequest('addRequest',{row:[
      req.id, req.empId, req.type,
      req.startDate, req.endDate,
      req.isHalf, req.days,
      req.note||'', req.approved,
      req.overflow||false, req.createdAt,
    ]});
  }catch(e){console.warn('addRequest:',e);}
}

async function updateRequest(id, fields){
  if(!_useGAS) return;
  try{
    await gasRequest('updateRequest',{id, fields});
  }catch(e){console.warn('updateRequest:',e);}
}

async function removeRequest(id){
  if(!_useGAS) return;
  try{
    await gasRequest('deleteRequest',{id});
  }catch(e){console.warn('removeRequest:',e);}
}

// ─── SYNC ─────────────────────────────────────────────────────────────────────

function hashData(arr){return arr.length+'|'+(arr[0]?.id||arr[0]?.ts||'')+'|'+(arr[arr.length-1]?.id||arr[arr.length-1]?.ts||'')}

async function syncFromRemote(){
  if(!_useGAS){setSyncStatus('local');return;}
  setSyncStatus('syncing');
  try{
    const [rd,ld]=await Promise.all([
      gasRequest('getRequests').catch(()=>null),
      gasRequest('getLogs').catch(()=>null),
    ]);
    const remoteReqs=(rd?.rows||[]).map(row=>({
      id:row[0], empId:row[1], type:row[2],
      startDate:row[3], endDate:row[4],
      isHalf:row[5]==='true'||row[5]===true,
      days:parseFloat(row[6])||0,
      note:row[7]||'',
      approved:row[8]==='true'||row[8]===true,
      overflow:row[9]==='true'||row[9]===true,
      createdAt:row[10]||'',
    }));
    const remoteLog=(ld?.rows||[]).map(row=>({ts:row[0],action:row[1],details:row[2]}));
    const newHash=hashData(remoteReqs)+'||'+hashData(remoteLog);
    if(newHash!==_lastSyncHash){
      _lastSyncHash=newHash;
      requests=remoteReqs;
      activityLog=remoteLog;
      const renders={team:renderTeam,board:renderBoard,calendar:renderCalendar,log:renderLog};
      ['team','board','calendar','log'].forEach(t=>refreshIfVisible('tab-'+t,renders[t]));
    }
    setSyncStatus('ok');
  }catch(e){
    setSyncStatus('error');
  }
}

function setSyncStatus(state){
  const el=document.getElementById('sync-status');
  if(!el)return;
  const cfg={
    syncing:{icon:'⟳',text:'Syncing…',     color:'var(--muted2)'},
    ok:     {icon:'◉',text:'Live · shared', color:'#6a6'},
    local:  {icon:'◉',text:'Local only',   color:'#a84'},
    error:  {icon:'◉',text:'Sync error',   color:'#a66'},
  }[state]||{icon:'◉',text:'',color:'var(--muted2)'};
  el.innerHTML=`<span style="color:${cfg.color};font-size:.8rem">${cfg.icon}</span><span style="color:var(--muted2);font-size:.75rem;margin-left:.3rem">${cfg.text}</span>`;
}

function startSync(){
  if(!_useGAS){setSyncStatus('local');return;}
  syncFromRemote();
  _syncInterval=setInterval(syncFromRemote,15000);
  document.addEventListener('visibilitychange',()=>{if(!document.hidden)syncFromRemote();});
}

function addLog(action,details){
  const entry={ts:new Date().toISOString(),action,details};
  activityLog.unshift(entry);
  if(activityLog.length>500)activityLog=activityLog.slice(0,500);
  appendLog(entry); // write single row to sheet
  refreshIfVisible('tab-log',renderLog);
}

// ─── DATE / FORMAT HELPERS ────────────────────────────────────────────────────

function formatDate(s){if(!s)return'';return new Date(s+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}
function daysFromNow(s){const n=new Date();n.setHours(0,0,0,0);return Math.round((new Date(s+'T00:00:00')-n)/864e5)}
function isWeekend(ds){const d=new Date(ds+'T00:00:00');return d.getDay()===5||d.getDay()===6}

// ─── HOLIDAY LOGIC ────────────────────────────────────────────────────────────

function isPublicHoliday(ds,empCountry){
  if((HOLIDAYS_2025[empCountry==='SA'?'SA':empCountry]||[]).includes(ds))return true;
  const hk=COUNTRY_HOL_KEY[empCountry];
  return !!(hk&&HOLIDAYS_2026[hk]?.holidays.some(h=>h.date===ds));
}

function buildHolMap(){
  if(_holMapCache)return _holMapCache;
  const map={};
  function add(date,countryKey,name,type){
    if(!map[date])map[date]=[];
    if(!map[date].find(x=>x.countryKey===countryKey&&x.name===name))
      map[date].push({countryKey,name,type});
  }
  HOLIDAYS_2025.EG.forEach(d=>add(d,'EG',HOLIDAY_NAMES_2025[d]||'Holiday','public'));
  HOLIDAYS_2025.SA.forEach(d=>add(d,'KSA',HOLIDAY_NAMES_2025[d]||'Holiday','public'));
  for(const[ck,c]of Object.entries(HOLIDAYS_2026))for(const h of c.holidays)add(h.date,ck,h.name,h.type);
  return(_holMapCache=map);
}

function getHolsInRange(start,end,empCountry){
  const dates=[];
  const s=new Date(start+'T00:00:00'),e=new Date((end||start)+'T00:00:00');
  for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1)){
    const ds=d.toISOString().split('T')[0];
    if(isPublicHoliday(ds,empCountry))dates.push(ds);
  }
  return dates;
}

function showHolWarning(warnEl,textEl,holDates){
  if(holDates.length){
    textEl.textContent='Public holidays excluded from PTO: '+holDates.map(d=>HOLIDAY_NAMES_2025[d]||d).join(', ');
    warnEl.classList.add('show');
  } else {
    warnEl.classList.remove('show');
  }
}

// ─── LEAVE CALCULATIONS ───────────────────────────────────────────────────────

function workingDays(start,end,empCountry,isHalf){
  if(!start||!end)return 0;
  if(isHalf)return 0.5;
  let n=0;
  const s=new Date(start+'T00:00:00'),e=new Date(end+'T00:00:00');
  for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1)){
    const ds=d.toISOString().split('T')[0];
    if(!isWeekend(ds)&&!isPublicHoliday(ds,empCountry))n++;
  }
  return n;
}

function getEmpRequests(id){return requests.filter(r=>r.empId===id)}
function getUsed(id,type){return getEmpRequests(id).filter(r=>r.type===type).reduce((a,r)=>a+r.days,0)}
function getVacRemaining(id){return Math.max(0,getPolicy(id).vacation-getUsed(id,'vacation'))}
function getSickRemaining(id){return Math.max(0,getPolicy(id).sick-getUsed(id,'sick'))}
function getRemaining(id,type){return type==='sick'?getSickRemaining(id):getVacRemaining(id)}

      <div style="font-size:.88rem;color:#aaa;line-height:1.6;margin-bottom:1.25rem">

        The remaining <strong style="color:#f5f5f5">${fromPto}</strong> day${fromPto!==1?'s':''} will be charged to their <strong style="color:#f5f5f5">PTO vacation balance</strong>.<br><br>Do you want to proceed?

        <button id="dlg-no" style="flex:1;font-family:DM Sans,sans-serif;font-weight:600;font-size:.88rem;padding:.65rem;border-radius:9px;border:1px solid #333;background:transparent;color:#888;cursor:pointer">Cancel</button>

  });
}

// ─── SHARED LEAVE SUBMIT HANDLER ──────────────────────────────────────────────

function makeId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}

async function handleLeaveSubmit({empId,type,start,end,isHalf,note,approved,onSuccess}){
  if(!empId){toast('Select an employee','error');return}
  if(!start){toast('Select a start date','error');return}
  if(end<start){toast('End date before start','error');return}
  const emp=EMPLOYEES.find(e=>e.id===empId);
  const days=workingDays(start,end,emp.country,isHalf);
  if(days<=0){toast('No working days in range','error');return}

  if(type==='sick'){
    const sickRem=getSickRemaining(empId);
    if(days>sickRem){
      const fromPto=days-sickRem;
      if(fromPto>getVacRemaining(empId)){toast(`Not enough PTO. ${emp.name} has ${getVacRemaining(empId)} PTO days left.`,'error');return}
      if(!await confirmSickOverflow(emp.name,sickRem,days))return;
      const sickReq={id:makeId(),empId,type:'sick',startDate:start,endDate:end,isHalf:false,note,approved,days:sickRem,createdAt:new Date().toISOString(),overflow:true};
      const ptoReq={id:makeId(),empId,type:'vacation',startDate:start,endDate:end,isHalf:false,note:`[Sick overflow \u2192 PTO] ${note}`,approved,days:fromPto,createdAt:new Date().toISOString(),overflow:true};
      if(sickRem>0){requests.unshift(sickReq);await addRequest(sickReq);}
      requests.unshift(ptoReq);await addRequest(ptoReq);
      addLog('SICK_OVERFLOW',`${emp.emoji} ${emp.name} \u2014 ${sickRem}d sick + ${fromPto}d PTO charged (${formatDate(start)}${end!==start?' \u2013 '+formatDate(end):''})`);
      _lastSyncHash=hashData(requests)+'||'+hashData(activityLog);
      toast(`${emp.emoji} ${emp.name} \u2014 ${sickRem}d sick + ${fromPto}d PTO charged`,'success');onSuccess?.();return;
    }
  }

  const rem=getRemaining(empId,type);
  if(days>rem){toast(`Only ${rem} ${type} days left for ${emp.name}`,'error');return}
  const newReq={id:makeId(),empId,type,startDate:start,endDate:end,isHalf,note,approved,days,createdAt:new Date().toISOString()};
  requests.unshift(newReq);
  await addRequest(newReq);
  addLog('SUBMITTED',`${emp.emoji} ${emp.name} \u2014 ${isHalf?'Half Day':type==='vacation'?'Vacation':'Sick'}, ${days}d, ${formatDate(start)}${end!==start?' \u2013 '+formatDate(end):''}${approved?' \u2713 Approved':' \u23F3 Pending'}`);
  _lastSyncHash=hashData(requests)+'||'+hashData(activityLog);
  toast(`${emp.emoji} ${emp.name} \u2014 ${days} day(s) submitted`,'success');onSuccess?.();
}

  document.getElementById('tab-request').innerHTML=`<div style="max-width:620px">
  <div class="section-title">New Leave Request<div class="section-sub">Submit a leave request for an employee</div></div>
  <div class="card" style="margin-bottom:1rem">
    <div class="balance-row">
      <div class="balance-pill"><div class="balance-pill-label">Vacation Left</div><div class="balance-pill-val" id="bal-vac">\u2014</div></div>
      <div class="balance-pill"><div class="balance-pill-label">Sick Left</div><div class="balance-pill-val" id="bal-sick" style="color:var(--muted)">\u2014</div></div>
      <div class="balance-pill"><div class="balance-pill-label">Days Requested</div><div class="balance-pill-val" id="bal-req" style="color:var(--muted)">\u2014</div></div>
    </div>
    <div class="holiday-warn" id="hol-warn"><span>&#x26A0;&#xFE0F;</span><span id="hol-warn-text">Public holiday overlap</span></div>
  </div>
  <div class="card">
    <div class="form-grid" style="margin-bottom:1rem">
      <div class="form-group"><label class="form-label">Employee</label><select class="form-select" id="f-emp" onchange="updateBalance()"><option value="">Select\u2026</option>${empSelectOptions()}</select></div>
      <div class="form-group"><label class="form-label">Leave Type</label><select class="form-select" id="f-type" onchange="updateBalance()"><option value="vacation">\u25C8 PTO Vacation</option><option value="sick">\u25BC Sick Day</option></select></div>
      <div class="form-group"><label class="form-label">Start Date</label><input type="date" class="form-input" id="f-start" onchange="updateBalance()"></div>
      <div class="form-group"><label class="form-label">End Date</label><input type="date" class="form-input" id="f-end" onchange="updateBalance()"></div>
    </div>
    <div class="toggle-row" style="margin-bottom:1rem">
      <label class="toggle"><input type="checkbox" id="f-half" onchange="updateBalance()"><span class="toggle-slider"></span></label>
      <span class="toggle-label">\u25D1 Half Day <span style="color:var(--muted2);font-size:.78rem">(0.5 day)</span></span>
    </div>
    <div class="form-group" style="margin-bottom:1rem"><label class="form-label">Note (optional)</label><textarea class="form-textarea" id="f-note" placeholder="Any additional context\u2026"></textarea></div>
    <label class="checkbox-row" style="margin-bottom:1.25rem"><input type="checkbox" id="f-approved"><span class="checkbox-label">&#x2705; Manager has approved this request</span></label>
    <button class="btn btn-primary" onclick="submitRequest()">Submit Request \u2726</button>
  </div></div>`;
}

function updateBalance(){
  const empId=document.getElementById('f-emp').value;
  const start=document.getElementById('f-start').value;
  const end=document.getElementById('f-end').value||start;
  const isHalf=document.getElementById('f-half').checked;
  const emp=EMPLOYEES.find(e=>e.id===empId);
  document.getElementById('bal-vac').textContent=empId?getVacRemaining(empId)+' days':'\u2014';
  document.getElementById('bal-sick').textContent=empId?getSickRemaining(empId)+' days':'\u2014';
  if(start&&emp){
    const days=workingDays(start,end,emp.country,isHalf);
    document.getElementById('bal-req').textContent=days+' day'+(days!==1&&days!==.5?'s':'');
    showHolWarning(document.getElementById('hol-warn'),document.getElementById('hol-warn-text'),getHolsInRange(start,end,emp.country));
  } else {
    document.getElementById('bal-req').textContent='\u2014';
    document.getElementById('hol-warn').classList.remove('show');
  }
}

function resetRequestForm(){
  ['f-emp','f-start','f-end','f-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-type').value='vacation';
  document.getElementById('f-half').checked=false;
  document.getElementById('f-approved').checked=false;
  updateBalance();
}

async function submitRequest(){
  const empId=document.getElementById('f-emp').value;
  const isHalf=document.getElementById('f-half').checked;
  const start=document.getElementById('f-start').value;
  await handleLeaveSubmit({
    empId,type:document.getElementById('f-type').value,start,
    end:document.getElementById('f-end').value||start,isHalf,
    note:document.getElementById('f-note').value.trim(),
    approved:document.getElementById('f-approved').checked,
    onSuccess(){resetRequestForm();refreshIfVisible('tab-team',renderTeam);}
  });
}

// ─── TAB: CALENDAR ────────────────────────────────────────────────────────────

function renderCalendar(){
  const cont=document.getElementById('tab-calendar');
  const todayStr=new Date().toISOString().split('T')[0];
  const firstDay=new Date(calYear,calMonth,1);
  const lastDay=new Date(calYear,calMonth+1,0);
  const startDow=(firstDay.getDay()+6)%7;

  const selectedEmp=calFilter==='all'?null:EMPLOYEES.find(e=>e.id===calFilter);
  const selectedHolKey=selectedEmp?COUNTRY_HOL_KEY[selectedEmp.country]:null;
  const activeHolKeys=selectedHolKey?new Set([selectedHolKey]):calHolFilter;
  const countryKeys=Object.keys(CAL_COUNTRY_META);
  const holMap=buildHolMap();

  // Build leave event map
  const eventMap={};
  for(const req of(calFilter==='all'?requests:requests.filter(r=>r.empId===calFilter))){
    const emp=EMPLOYEES.find(e=>e.id===req.empId);if(!emp)continue;
    const s=new Date(req.startDate+'T00:00:00'),e=new Date(req.endDate+'T00:00:00');
    for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1)){
      const ds=d.toISOString().split('T')[0];
      if(!eventMap[ds])eventMap[ds]=[];
      eventMap[ds].push({...req,empName:emp.name,empEmoji:emp.emoji});
    }
  }

  const filterPillsHtml=selectedEmp
    ?`<span style="font-size:.72rem;color:var(--muted2);padding:.3rem .5rem;background:var(--card2);border:1px solid var(--border2);border-radius:6px">${COUNTRY_ICONS[selectedEmp.country]||''} ${COUNTRY_NAMES[selectedEmp.country]} holidays</span>`
    :countryKeys.map(ck=>`<button class="hol-filter-btn${calHolFilter.has(ck)?' active':''}" style="font-size:.72rem;padding:.3rem .65rem" onclick="toggleCalHol('${ck}')">${ck}</button>`).join('');

  let h=`<div class="section-title">Leave Calendar<div class="section-sub">${selectedEmp?`${selectedEmp.emoji} ${selectedEmp.name} \u2014 ${COUNTRY_NAMES[selectedEmp.country]} public holidays shown`:'All leave events and public holidays by country'}</div></div>
<div class="card">
  <div class="cal-header" style="flex-wrap:wrap;gap:.6rem">
    <div class="cal-nav"><button class="cal-btn" onclick="calNav(-1)">\u2039</button><span class="cal-month">${MONTH_NAMES[calMonth]} ${calYear}</span><button class="cal-btn" onclick="calNav(1)">\u203A</button></div>
    <div style="display:flex;gap:.35rem;flex-wrap:wrap;align-items:center"><span style="font-size:.7rem;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.07em">Holidays</span>${filterPillsHtml}</div>
    <select class="cal-filter" onchange="calFilter=this.value;renderCalendar()"><option value="all">All employees</option>${empSelectOptions()}</select>
  </div>
  <div class="cal-grid">${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}`;

  for(let i=0;i<startDow;i++){h+=`<div class="cal-day other-month"><span class="cal-day-num">${new Date(calYear,calMonth,1-startDow+i).getDate()}</span></div>`;}

  for(let day=1;day<=lastDay.getDate();day++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const events=eventMap[ds]||[];
    const dayHols=(holMap[ds]||[]).filter(hh=>activeHolKeys.has(hh.countryKey));

    // Merge holidays by name
    const holByName={};
    for(const hh of dayHols){
      if(!holByName[hh.name])holByName[hh.name]={name:hh.name,countries:[],type:hh.type};
      if(!holByName[hh.name].countries.includes(hh.countryKey))holByName[hh.name].countries.push(hh.countryKey);
    }
    const holGroups=Object.values(holByName);
    const flagCountries=[...new Set(dayHols.map(hh=>hh.countryKey))];
    const flagsHtml=flagCountries.length?`<div class="cal-day-flags">${flagCountries.map(ck=>`<span class="cal-flag" title="${HOLIDAYS_2026[ck]?.name||ck}">${HOL_FLAGS[ck]||''}</span>`).join('')}</div>`:'';
    const hasContent=events.length>0||holGroups.length>0;
    const isToday=ds===todayStr;
    const wknd=isWeekend(ds);

    let dh=`<div class="cal-day${isToday?' today':''}${wknd?' weekend':''}${hasContent?' has-content':''}"${hasContent?` onclick="openDayDetail('${ds}')"`:''}><span class="cal-day-num">${day}</span>${flagsHtml}`;

    for(const g of holGroups){
      const cls=CAL_COUNTRY_META[g.countries[0]]?.cls||'ev-hol-eg';
      const tags=selectedEmp?'':g.countries.map(ck=>`<span style="opacity:.65;font-size:.58rem">${ck}</span>`).join(' ');
      dh+=`<div class="cal-event ${cls}" title="${g.name}${g.type==='observed'?' \u00B0':''} \u2014 ${g.countries.join(', ')}">${tags}${tags?' ':''}${g.name.length>17?g.name.slice(0,15)+'\u2026':g.name}${g.type==='observed'?' \u00B0':''}</div>`;
    }
    const maxLeave=Math.max(0,4-holGroups.length);
    for(const ev of events.slice(0,maxLeave)){
      const cls=ev.isHalf?'ev-half':ev.type==='vacation'?'ev-vac':'ev-sick';
      dh+=`<div class="cal-event ${cls}">${ev.empEmoji} ${ev.empName}${ev.isHalf?' \u00BD':''}</div>`;
    }
    if(events.length>maxLeave)dh+=`<div class="cal-event" style="color:var(--muted2);background:rgba(255,255,255,.04)">+${events.length-maxLeave} more</div>`;
    h+=dh+'</div>';
  }

  const trailing=(7-(startDow+lastDay.getDate())%7)%7;
  for(let i=1;i<=trailing;i++)h+=`<div class="cal-day other-month"><span class="cal-day-num">${i}</span></div>`;

  const legendKeys=selectedEmp?[selectedHolKey]:countryKeys;
  h+=`</div>
  <div class="cal-legend" style="margin-top:1rem;flex-wrap:wrap;gap:.75rem">
    <div class="leg-item"><div class="leg-dot" style="background:rgba(255,255,255,.14)"></div>Vacation</div>
    <div class="leg-item"><div class="leg-dot" style="background:rgba(255,255,255,.06)"></div>Sick</div>
    <div class="leg-item"><div class="leg-dot" style="background:rgba(255,255,255,.09)"></div>Half Day</div>
    ${legendKeys.filter(Boolean).map(ck=>`<div class="leg-item"><div class="leg-dot" style="background:${CAL_COUNTRY_META[ck]?.dot||'rgba(255,255,255,.1)'};border:1px solid rgba(255,255,255,.15)"></div>${HOLIDAYS_2026[ck]?.name||ck}</div>`).join('')}
    <div class="leg-item" style="color:var(--muted2)">\u00B0 = Observed</div>
  </div>
</div>`;
  cont.innerHTML=h;
}

function toggleCalHol(ck){calHolFilter.has(ck)?calHolFilter.delete(ck):calHolFilter.add(ck);renderCalendar()}
function calNav(dir){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++}if(calMonth<0){calMonth=11;calYear--}renderCalendar()}

// ─── DAY DETAIL DRAWER ────────────────────────────────────────────────────────

function openDayDetail(ds){
  const holMap=buildHolMap();
  const dayHols=holMap[ds]||[];
  const dayEvents=requests.filter(r=>ds>=r.startDate&&ds<=r.endDate);
  let html=`<div class="day-drawer-handle"></div><div class="day-drawer-date">${new Date(ds+'T00:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>`;

  if(dayHols.length){
    const byName={};
    for(const hh of dayHols){
      if(!byName[hh.name])byName[hh.name]={name:hh.name,type:hh.type,countries:[]};
      byName[hh.name].countries.push(hh.countryKey);
    }
    html+=`<div class="day-drawer-section"><div class="day-drawer-section-label">Public Holidays &amp; Observations</div>`;
    for(const g of Object.values(byName)){
      html+=`<div class="day-drawer-row"><div class="day-drawer-row-icon">${g.countries.map(ck=>HOL_FLAGS[ck]||'').join(' ')}</div><div class="day-drawer-row-main"><div class="day-drawer-row-name">${g.name}</div><div class="day-drawer-row-sub">${g.countries.map(ck=>HOL_NAMES[ck]||ck).join(', ')}</div></div><span class="day-drawer-hol-type">${g.type==='observed'?'Observed':'Public'}</span></div>`;
    }
    html+='</div>';
  }
  if(dayEvents.length){
    html+=`<div class="day-drawer-section"><div class="day-drawer-section-label">Leave</div>`;
    for(const ev of dayEvents){
      const emp=EMPLOYEES.find(e=>e.id===ev.empId);if(!emp)continue;
      const typeLabel=ev.isHalf?'Half Day':ev.type==='vacation'?'Vacation':'Sick';
      const icon=ev.isHalf?'\u25D1':ev.type==='vacation'?'\u25C8':'\u25BC';
      html+=`<div class="day-drawer-row"><div class="day-drawer-row-icon">${emp.emoji}</div><div class="day-drawer-row-main"><div class="day-drawer-row-name">${emp.name} ${COUNTRY_ICONS[emp.country]||''}</div><div class="day-drawer-row-sub">${icon} ${typeLabel} \u00B7 ${ev.approved?'\u2713 Approved':'\u23F3 Pending'}</div></div>${ev.isHalf?'<span class="day-drawer-hol-type">\u00BD</span>':''}</div>`;
    }
    html+='</div>';
  }
  if(!dayHols.length&&!dayEvents.length)html+=`<div style="text-align:center;padding:1.5rem 0;color:var(--muted);font-size:.85rem">Nothing scheduled this day.</div>`;
  html+=`<button onclick="closeDayDrawer()" style="width:100%;margin-top:.5rem;font-family:DM Sans,sans-serif;font-weight:600;font-size:.84rem;padding:.6rem;border-radius:9px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer">Close</button>`;
  document.getElementById('day-drawer-content').innerHTML=html;
  document.getElementById('day-drawer-overlay').classList.add('open');
}
function closeDayDrawer(){document.getElementById('day-drawer-overlay').classList.remove('open')}

// ─── TAB: PUBLIC BOARD ────────────────────────────────────────────────────────

function renderBoard(){
  const cont=document.getElementById('tab-board');
  const filtered=boardFilter==='all'?requests:requests.filter(r=>r.empId===boardFilter);
  let listHtml=filtered.length?'':'<div class="empty"><span class="empty-icon">&#x1F4CB;</span>No leave requests yet.<br>Use Quick Add or New Request to get started.</div>';
  for(const req of filtered){
    const emp=EMPLOYEES.find(e=>e.id===req.empId);if(!emp)continue;
    const dotColor=req.isHalf?'#555':req.type==='vacation'?'#ccc':'#666';
    const dr=req.startDate===req.endDate?formatDate(req.startDate):`${formatDate(req.startDate)} \u2013 ${formatDate(req.endDate)}`;
    listHtml+=`<div class="req-card" id="req-${req.id}">
      <div class="req-type-dot" style="background:${dotColor}"></div>
      <div class="req-info">
        <div class="req-name">${emp.emoji} ${emp.name} <span style="font-size:.85rem">${COUNTRY_ICONS[emp.country]||''}</span></div>
        <div class="req-dates">${dr} \u00B7 ${req.days} day${req.days!==1?'s':''}</div>
        ${req.note?`<div class="req-note">"${req.note}"</div>`:''}
      </div>
      <div class="req-badges">
        <span class="badge ${req.type==='vacation'?'badge-vac':'badge-sick'}">${req.isHalf?'\u25D1 Half':req.type==='vacation'?'\u25C8 Vacation':'\u25BC Sick'}</span>
        <span class="badge ${req.approved?'badge-approved':'badge-pending'}">${req.approved?'\u2713 Approved':'\u23F3 Pending'}</span>
      </div>
      <div class="req-actions">
        <button class="action-btn approve" onclick="toggleApproval('${req.id}')">${req.approved?'Revoke':'Approve'}</button>
        <button class="action-btn del" onclick="deleteReq('${req.id}')">\u2715</button>
      </div>
    </div>`;
  }
  cont.innerHTML=`<div class="section-title">Public Board<div class="section-sub">${requests.length} total \u00B7 newest first</div></div>
<div class="board-filters"><select class="filter-select" onchange="boardFilter=this.value;renderBoard()"><option value="all">All employees</option>${empSelectOptions()}</select><span style="font-size:.8rem;color:var(--muted)">${filtered.length} shown</span></div>
<div class="req-list">${listHtml}</div>`;
}

// ─── CENTERED CONFIRM DIALOG ──────────────────────────────────────────────────

function showConfirm({icon='⚠️', title, body, warn='', confirmLabel='Confirm', cancelLabel='Cancel', onConfirm, danger=false}){
  const overlay=document.createElement('div');
  overlay.className='confirm-overlay';
  overlay.innerHTML=`
    <div class="confirm-box">
      <div class="confirm-icon">${icon}</div>
      <div class="confirm-title">${title}</div>
      <div class="confirm-body">${body}</div>
      ${warn?`<div class="confirm-warn">${warn}</div>`:''}
      <div class="confirm-actions">
        <button class="confirm-btn confirm-btn-secondary" id="c-cancel">${cancelLabel}</button>
        <button class="confirm-btn confirm-btn-primary" id="c-ok" style="${danger?'background:#c44;color:#fff':''}">${confirmLabel}</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  const remove=()=>overlay.remove();
  overlay.querySelector('#c-cancel').onclick=remove;
  overlay.querySelector('#c-ok').onclick=()=>{remove();onConfirm();};
  overlay.addEventListener('click',e=>{if(e.target===overlay)remove();});
}

async function toggleApproval(id){
  const req=requests.find(r=>r.id===id);if(!req)return;
  const emp=EMPLOYEES.find(e=>e.id===req.empId);
  const action=req.approved?'Revoke':'Approve';
  const typeLabel=req.isHalf?'Half Day':req.type==='vacation'?'Vacation':'Sick Leave';
  const dr=req.startDate===req.endDate?formatDate(req.startDate):`${formatDate(req.startDate)} \u2013 ${formatDate(req.endDate)}`;

  showConfirm({
    icon: req.approved ? '↩️' : '✅',
    title: `${action} Leave Request`,
    body: `You are about to <strong>${action.toLowerCase()}</strong> <strong>${emp?.emoji||''} ${emp?.name||'?'}</strong>'s ${typeLabel} request<br>(${dr} &middot; ${req.days} day${req.days!==1?'s':''}).`,
    warn: '⚠ Only proceed if you are this employee\u2019s manager or have authorization to manage leave requests.',
    confirmLabel: `Yes, ${action}`,
    cancelLabel: 'Cancel',
    async onConfirm(){
      req.approved=!req.approved;
      await updateRequest(req.id,{approved:req.approved});
      addLog(req.approved?'APPROVED':'REVOKED',`${emp?.emoji||''} ${emp?.name||'?'} \u2014 ${typeLabel}, ${req.days}d, ${formatDate(req.startDate)}${req.endDate!==req.startDate?' \u2013 '+formatDate(req.endDate):''}`);
      _lastSyncHash=hashData(requests)+'||'+hashData(activityLog);
      toast(`${req.approved?'Approved':'Revoked'}: ${emp?.name}`,'info');
      renderBoard();renderTeam();
    }
  });
}

async function deleteReq(id){
  const req=requests.find(r=>r.id===id);
  const emp=EMPLOYEES.find(e=>e.id===req?.empId);
  const typeLabel=req?.isHalf?'Half Day':req?.type==='vacation'?'Vacation':'Sick Leave';
  const dr=req?.startDate===req?.endDate?formatDate(req?.startDate):`${formatDate(req?.startDate)} \u2013 ${formatDate(req?.endDate)}`;

  showConfirm({
    icon: '🗑️',
    title: 'Delete Request',
    body: `Permanently delete <strong>${emp?.emoji||''} ${emp?.name||'?'}</strong>'s ${typeLabel} request<br>(${dr} &middot; ${req?.days||0} day${req?.days!==1?'s':''})?<br><br>This cannot be undone.`,
    warn: '⚠ Only proceed if you are this employee\u2019s manager or have authorization to manage leave records.',
    confirmLabel: 'Yes, Delete',
    cancelLabel: 'Cancel',
    danger: true,
    async onConfirm(){
      addLog('DELETED',`${emp?.emoji||''} ${emp?.name||'?'} \u2014 ${typeLabel}, ${req?.days||0}d, ${formatDate(req?.startDate)}`);
      requests=requests.filter(r=>r.id!==id);
      await removeRequest(id);
      _lastSyncHash=hashData(requests)+'||'+hashData(activityLog);
      toast(`Deleted: ${emp?.name||'request'}`,'info');
      renderBoard();renderTeam();
    }
  });
}

// ─── TAB: 2026 HOLIDAYS ───────────────────────────────────────────────────────

function renderHolidays(){
  const cont=document.getElementById('tab-holidays');
  const todayStr=new Date().toISOString().split('T')[0];
  const countryKeys=Object.keys(HOLIDAYS_2026);
  const filterBtnsHtml=['ALL',...countryKeys].map(k=>`<button class="hol-filter-btn${holFilter===k?' active':''}" onclick="holFilter='${k}';renderHolidays()">${k==='ALL'?'All Countries':HOLIDAYS_2026[k].name}</button>`).join('');

  let html=`<div class="section-title">2026 Public Holidays<div class="section-sub">Official holidays and observances \u2014 KSA, Egypt, UAE, Pakistan, Germany</div></div>
<div class="hol-filter-row">${filterBtnsHtml}</div>`;

  for(const key of(holFilter==='ALL'?countryKeys:[holFilter])){
    const country=HOLIDAYS_2026[key];
    const sorted=[...country.holidays].sort((a,b)=>a.date.localeCompare(b.date));
    const next=sorted.find(h=>h.date>=todayStr);
    html+=`<div class="hol-country-block"><div class="hol-country-header">
      <div style="font-size:1.1rem;line-height:1">${HOL_FLAGS[key]||'\u25C6'}</div>
      <div class="hol-country-name">${country.name}</div>
      <div style="font-size:.75rem;color:var(--muted2);margin-left:.5rem">${sorted.length} days</div>
      ${next?`<div style="font-size:.72rem;color:var(--muted2);margin-left:auto;background:var(--card2);border:1px solid var(--border2);border-radius:6px;padding:.15rem .6rem;white-space:nowrap">Next: ${formatDate(next.date)}</div>`:''}
    </div><table class="hol-table">`;
    for(const h of sorted){
      const isPast=h.date<todayStr, isNext=next&&h.date===next.date, days=daysFromNow(h.date);
      html+=`<tr${isNext?' style="background:rgba(255,255,255,.03)"':''}>
        <td class="hol-date" style="${isPast?'opacity:.4':''}${isNext?';color:var(--white)':''}">${formatDate(h.date)}</td>
        <td class="hol-name" style="${isPast?'opacity:.4;color:var(--muted)':''}">${h.name}${isNext?' <span style="font-size:.7rem;color:var(--muted2);font-weight:400">\u2014 upcoming</span>':''}${days<=30&&!isPast&&!isNext?' <span style="font-size:.7rem;color:var(--muted2);font-weight:400">'+days+'d away</span>':''}</td>
        <td class="hol-type"><span class="hol-badge ${h.type==='public'?'hol-badge-pub':'hol-badge-obs'}">${h.type==='public'?'Public':'Observed'}</span></td>
      </tr>`;
    }
    html+=`</table></div>`;
  }

  if(holFilter==='ALL'){
    const all=countryKeys.flatMap(k=>HOLIDAYS_2026[k].holidays);
    const upcoming=all.filter(h=>h.date>=todayStr).length;
    html+=`<div class="card" style="margin-top:1rem"><div style="display:flex;gap:1rem;flex-wrap:wrap">

  <div style="background:#0d0d0d;border:1px solid #333;border-radius:10px;padding:1rem;margin-bottom:.85rem;font-size:.74rem;font-family:monospace;color:#bbb;line-height:1.65;overflow-x:auto;white-space:pre-wrap">const SHEET_NAME = 'Data';

function doPost(e) {
  const data = JSON.parse(e.postData.contents);
  const sheet = getOrCreateSheet();
  if (data.action === 'set') { upsertRow(sheet, data.key, data.value); return json({ok:true}); }
  if (data.action === 'get') { return json({value: getRow(sheet, data.key)}); }
  return json({error: 'unknown action'});
}
function getOrCreateSheet() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  return ss.getSheetByName(SHEET_NAME) || ss.insertSheet(SHEET_NAME);
}
function upsertRow(sheet, key, value) {
  const data = sheet.getDataRange().getValues();
  for (let i = 0; i &lt; data.length; i++) {
    if (data[i][0] === key) { sheet.getRange(i+1, 2).setValue(value); return; }
  }
  sheet.appendRow([key, value]);
}
function getRow(sheet, key) {
  const data = sheet.getDataRange().getValues();
  for (const row of data) { if (row[0] === key) return row[1]; }
  return null;
}
function json(obj) {
  return ContentService.createTextOutput(JSON.stringify(obj)).setMimeType(ContentService.MimeType.JSON);
}</div>

// ─── TAB: USAGE LOG ───────────────────────────────────────────────────────────

let logFilter='ALL';

const LOG_META={
  SUBMITTED:  {label:'Submitted', dotCls:'log-dot-submit'},
  APPROVED:   {label:'Approved',  dotCls:'log-dot-approved'},
  REVOKED:    {label:'Revoked',   dotCls:'log-dot-revoked'},
  DELETED:    {label:'Deleted',   dotCls:'log-dot-deleted'},
  SICK_OVERFLOW:{label:'Sick→PTO',dotCls:'log-dot-overflow'},
};
const LOG_FILTERS=['ALL','SUBMITTED','APPROVED','REVOKED','DELETED','SICK_OVERFLOW'];

function renderLog(){
  const cont=document.getElementById('tab-log');
  const filtered=logFilter==='ALL'?activityLog:activityLog.filter(e=>e.action===logFilter);

  // Stats
  const counts={};
  for(const e of activityLog)counts[e.action]=(counts[e.action]||0)+1;
  const statsHtml=`<div class="log-stats">
    <div class="log-stat-pill"><div class="log-stat-pill-val">${activityLog.length}</div><div class="log-stat-pill-label">Total events</div></div>
    <div class="log-stat-pill"><div class="log-stat-pill-val">${counts.SUBMITTED||0}</div><div class="log-stat-pill-label">Submitted</div></div>
    <div class="log-stat-pill"><div class="log-stat-pill-val">${counts.APPROVED||0}</div><div class="log-stat-pill-label">Approved</div></div>
    <div class="log-stat-pill"><div class="log-stat-pill-val">${counts.DELETED||0}</div><div class="log-stat-pill-label">Deleted</div></div>
  </div>`;

  // Filter pills
  const pillsHtml=LOG_FILTERS.map(f=>`<button class="log-filter-btn${logFilter===f?' active':''}" onclick="logFilter='${f}';renderLog()">${f==='ALL'?'All':LOG_META[f]?.label||f}</button>`).join('');

  if(!filtered.length){
    cont.innerHTML=`<div class="section-title">Usage Log<div class="section-sub">All tracker actions recorded automatically</div></div>${statsHtml}<div class="log-toolbar">${pillsHtml}<button class="log-clear" onclick="clearLog()">Clear Log</button></div><div class="empty"><span class="empty-icon" style="font-size:2rem">📋</span>No activity yet. Actions will appear here as you use the tracker.</div>`;
    return;
  }

  // Group by date
  const groups={};
  for(const entry of filtered){
    const day=entry.ts.split('T')[0];
    if(!groups[day])groups[day]=[];
    groups[day].push(entry);
  }

  let listHtml='';
  for(const [day, entries] of Object.entries(groups)){
    const dayLabel=new Date(day+'T00:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    listHtml+=`<div class="log-day-group"><div class="log-day-label">${dayLabel} &mdash; ${entries.length} event${entries.length!==1?'s':''}</div>`;
    for(const e of entries){
      const meta=LOG_META[e.action]||{label:e.action,dotCls:'log-dot-submit'};
      const t=new Date(e.ts);
      const timeStr=t.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
      listHtml+=`<div class="log-entry">
        <div class="log-dot ${meta.dotCls}"></div>
        <div class="log-body">
          <div class="log-action log-action-${e.action}">${meta.label}</div>
          <div class="log-details">${e.details}</div>
        </div>
        <div class="log-time">${timeStr}</div>
      </div>`;
    }
    listHtml+='</div>';
  }

  cont.innerHTML=`<div class="section-title">Usage Log<div class="section-sub">${activityLog.length} total event${activityLog.length!==1?'s':''} &middot; newest first</div></div>${statsHtml}<div class="log-toolbar">${pillsHtml}<button class="log-clear" onclick="clearLog()">Clear Log</button></div><div class="log-list">${listHtml}</div>`;
}

async function clearLog(){
  if(!confirm('Clear all usage log entries? This cannot be undone.'))return;
  activityLog=[];await saveLog();renderLog();
}

  }
  await Promise.all([load(),loadLog()]);
  _lastSyncHash=hashData(requests)+'||'+hashData(activityLog);
  const now=new Date();
  calMonth=now.getMonth();calYear=now.getFullYear();
  document.getElementById('today-label').textContent=now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  showTab('team');
  startSync();
}
init();
</script>
